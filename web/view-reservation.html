<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Reservation — Ocean View Resort</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app-layout">
<aside class="sidebar">
    <a class="sidebar-brand" href="/dashboard.html"><span class="brand-icon">🏖️</span><div><span class="brand-text">Ocean View Resort</span><span class="brand-sub">Galle, Sri Lanka</span></div></a>
    <ul class="sidebar-nav">
        <li><a href="/dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a></li>
        <li><a href="/reservations.html"><span class="nav-icon">📋</span> Reservations</a></li>
        <li><a href="/add-reservation.html"><span class="nav-icon">➕</span> New Booking</a></li>
        <li><a href="/help.html"><span class="nav-icon">📖</span> Help &amp; Guide</a></li>
        <li class="nav-divider"></li><li id="admin-nav-links"></li>
    </ul>
    <div class="sidebar-bottom">
        <div class="sidebar-user"><div class="sidebar-user-avatar">👤</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="nav-username"></div><div class="sidebar-user-role" id="nav-role"></div></div></div>
        <button id="btn-logout">⏻ Sign Out</button>
    </div>
</aside>
<div class="main-content">
<div class="bg-slideshow" id="bg-slideshow"></div>
<div class="floating-emojis"><span class="fe">🌴</span><span class="fe">🌊</span><span class="fe">🐚</span><span class="fe">☀️</span><span class="fe">🏄</span><span class="fe">🐠</span><span class="fe">🦀</span><span class="fe">⛵</span></div>
<div class="page-wrapper">
    <div class="page-header">
        <h1>Reservation Details</h1>
        <p>Full information for the selected reservation.</p>
    </div>

    <div id="alert-box" class="alert hidden"></div>

    <div id="reservation-detail">
        <div style="text-align:center;padding:3rem"><span class="spinner"></span></div>
    </div>

    <footer class="page-footer">
        <strong>Ocean View Resort</strong> · Room Reservation System v2.0 · CIS6003 Advanced Programming
    </footer>
</div>
</div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    requireAuth();
    renderNavUser();
    initBgSlideshow();

    const params = new URLSearchParams(window.location.search);
    const resNum = params.get('num');
    if (!resNum) { window.location.href = '/reservations.html'; }
    else { loadDetail(resNum); }

    const STATUS_BADGE = {
        CONFIRMED: 'badge-success', CHECKED_IN: 'badge-info',
        CHECKED_OUT: 'badge-secondary', CANCELLED: 'badge-danger'
    };
    const roomImages = { 'Standard': '/images/room.jpg', 'Deluxe': '/images/double_bed.jpg', 'Suite': '/images/presidential_suite.jpg' };

    async function loadDetail(num) {
        document.getElementById('reservation-detail').innerHTML =
            '<div class="loading-center"><span class="spinner spinner-lg"></span></div>';
        try {
            const r = await ReservationAPI.getOne(num);
            if (!r || !r.reservationNumber) {
                document.getElementById('reservation-detail').innerHTML =
                    '<div class="alert alert-danger">Reservation not found: ' + num + '</div>'; return;
            }

            const role = getRole();

            document.getElementById('reservation-detail').innerHTML = `
                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">
                        <div class="card-title" style="margin:0;border:none;padding:0">
                            📄 Reservation ${r.reservationNumber}
                        </div>
                        <span class="badge ${STATUS_BADGE[r.status] || 'badge-secondary'}">${r.status.replace('_',' ')}</span>
                    </div>

                    <div style="margin-bottom:1.2rem;display:flex;gap:1.2rem;align-items:center;flex-wrap:wrap">
                        <img src="${roomImages[r.roomTypeName] || '/images/room2.jpg'}" alt="${r.roomTypeName}" style="width:180px;height:110px;object-fit:cover;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,0.15)">
                        <div>
                            <div style="font-size:1.3rem;font-weight:800;color:var(--dark)">${r.roomTypeName} Room</div>
                            <div style="font-size:0.95rem;color:var(--grey-700);margin-top:0.2rem">LKR ${Number(r.pricePerNight||0).toLocaleString()} / night</div>
                        </div>
                    </div>

                    <div class="detail-grid">
                        <div class="detail-item"><label>Guest Name</label><p>${r.guestName || '—'}</p></div>
                        <div class="detail-item"><label>Contact Number</label><p>${r.contactNumber || '—'}</p></div>
                        <div class="detail-item"><label>Address</label><p>${r.address || '—'}</p></div>
                        <div class="detail-item"><label>Room Type</label><p>${r.roomTypeName || '—'}</p></div>
                        <div class="detail-item"><label>Check-In Date</label><p>${r.checkInDate || '—'}</p></div>
                        <div class="detail-item"><label>Check-Out Date</label><p>${r.checkOutDate || '—'}</p></div>
                        <div class="detail-item"><label>Special Requests</label><p>${r.specialRequests || '—'}</p></div>
                        <div class="detail-item"><label>Created By</label><p>${r.createdBy || '—'}</p></div>
                        <div class="detail-item"><label>Created At</label><p>${r.createdAt || '—'}</p></div>
                        <div class="detail-item"><label>Price / Night</label><p>LKR ${Number(r.pricePerNight||0).toLocaleString()}</p></div>
                    </div>

                    <div class="divider"></div>

                    <div class="action-bar">
                        <a href="/reservations.html" class="btn btn-secondary">← Back</a>
                        <a href="/bill.html?num=${num}" class="btn btn-info">🧾 Bill</a>
                        ${r.status === 'CONFIRMED' ?
                            `<button class="btn btn-success" id="btn-checkin">✅ Check In</button>` : ''}
                        ${r.status === 'CHECKED_IN' && (role === 'ADMIN' || role === 'MANAGER') ?
                            `<button class="btn btn-warning" id="btn-checkout">🏁 Check Out</button>` : ''}
                        ${r.status !== 'CANCELLED' && r.status !== 'CHECKED_OUT' && (role === 'ADMIN' || role === 'MANAGER') ?
                            `<button class="btn btn-danger" id="btn-cancel">✕ Cancel</button>` : ''}
                    </div>
                </div>
            `;

            wireButtons(r, num);
        } catch {
            document.getElementById('reservation-detail').innerHTML =
                '<div class="alert alert-danger">Error loading reservation details.</div>';
        }
    }

    function wireButtons(r, num) {
        const ciBtn = document.getElementById('btn-checkin');
        if (ciBtn) {
            ciBtn.addEventListener('click', async () => {
                ciBtn.disabled = true; ciBtn.textContent = '…';
                const res = await StatusAPI.checkIn(num);
                if (res.success) { showAlert('alert-box', 'Guest checked in successfully.', 'success'); loadDetail(num); }
                else { showAlert('alert-box', res.message || 'Check-in failed.', 'danger'); ciBtn.disabled = false; ciBtn.textContent = '✅ Check In'; }
            });
        }
        const coBtn = document.getElementById('btn-checkout');
        if (coBtn) {
            coBtn.addEventListener('click', async () => {
                coBtn.disabled = true; coBtn.textContent = '…';
                const res = await StatusAPI.checkOut(num);
                if (res.success) { showAlert('alert-box', 'Guest checked out successfully.', 'success'); loadDetail(num); }
                else { showAlert('alert-box', res.message || 'Check-out failed.', 'danger'); coBtn.disabled = false; coBtn.textContent = '🏁 Check Out'; }
            });
        }
        const caBtn = document.getElementById('btn-cancel');
        if (caBtn) {
            caBtn.addEventListener('click', () => {
                showConfirm('Cancel Reservation', 'Are you sure you want to cancel reservation ' + num + '? This action cannot be undone.', '⚠️', async () => {
                    const res = await ReservationAPI.cancel(num);
                    if (res.success) { showAlert('alert-box', 'Reservation cancelled.', 'warning'); loadDetail(num); }
                    else { showAlert('alert-box', res.message || 'Failed to cancel.', 'danger'); }
                }, 'Cancel Reservation', 'btn-danger');
            });
        }
    }
</script>
</body>
</html>
