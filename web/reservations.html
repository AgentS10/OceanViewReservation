<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations — Ocean View Resort</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="/dashboard.html"><span class="brand-icon">🌊</span> Ocean View Resort</a>
    <ul class="navbar-nav">
        <li><a href="/dashboard.html">🏠 Dashboard</a></li>
        <li><a href="/reservations.html">📋 Reservations</a></li>
        <li><a href="/add-reservation.html">➕ New</a></li>
        <li><a href="/help.html">❓ Help</a></li>
        <ul id="admin-nav-links" class="navbar-nav" style="display:contents"></ul>
    </ul>
    <div class="navbar-right">
        <div class="navbar-user-info">
            <div class="navbar-user-name" id="nav-username"></div>
            <div class="navbar-user-role" id="nav-role"></div>
        </div>
        <button id="btn-logout">⏻ Logout</button>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <h1>All Reservations</h1>
        <p>Browse, search and manage guest reservations.</p>
    </div>

    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.75rem">
            <div class="search-bar" style="margin:0">
                <input type="text" id="search-input" class="form-control"
                       placeholder="Search by guest name…" style="max-width:280px">
                <button id="btn-search" class="btn btn-primary btn-sm">Search</button>
                <button id="btn-clear"  class="btn btn-secondary btn-sm">Clear</button>
            </div>
            <a href="/add-reservation.html" class="btn btn-success btn-sm">+ Add Reservation</a>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Reservation #</th>
                        <th>Guest Name</th>
                        <th>Contact</th>
                        <th>Room Type</th>
                        <th>Check-In</th>
                        <th>Check-Out</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="reservations-tbody">
                    <tr><td colspan="8" style="text-align:center"><span class="spinner"></span></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/reservation.js"></script>
</body>
</html>
